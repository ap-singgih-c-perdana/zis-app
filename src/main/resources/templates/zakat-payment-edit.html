<!DOCTYPE html>
<html layout:decorate="~{shared/layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Pembayaran</title>
</head>
<body>

<div layout:fragment="content">
    <div class="content-header">
        <div class="container-fluid">
            <div class="row mb-2">
                <div class="col-sm-6">
                    <h1 class="m-0 text-dark">Edit Pembayaran</h1>
                </div>
                <div class="col-sm-6">
                    <ol class="breadcrumb float-sm-right">
                        <li class="breadcrumb-item"><a href="/">Home</a></li>
                        <li class="breadcrumb-item"><a href="/zakat-payments/list">Riwayat</a></li>
                        <li class="breadcrumb-item active">Edit</li>
                    </ol>
                </div>
            </div>
        </div>
    </div>

    <section class="content">
        <div class="container-fluid">

            <div class="alert alert-success d-none" id="alertSuccess"></div>
            <div class="alert alert-danger d-none" id="alertError"></div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Info Pembayaran</h3>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>No. Kwitansi</label>
                                <input class="form-control" id="receiptNumber" readonly type="text">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>Tanggal</label>
                                <input class="form-control" id="createdAt" readonly type="text">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="payerName">Nama Pembayar</label>
                                <input class="form-control" id="payerName" type="text">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="payerPhone">No. HP Pembayar</label>
                                <input class="form-control" id="payerPhone" type="tel">
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-group">
                                <label for="alamat">Alamat</label>
                                <textarea class="form-control" id="alamat" rows="2"></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Jiwa & Nilai</h3>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="jumlahJiwa">Jumlah Jiwa</label>
                                <div class="input-group">
                                    <div class="input-group-prepend">
                                        <button class="btn btn-outline-secondary" id="btnJiwaMinus" type="button">-</button>
                                    </div>
                                    <input class="form-control text-center" id="jumlahJiwa" min="1" step="1" type="number" value="1">
                                    <div class="input-group-append">
                                        <button class="btn btn-outline-secondary" id="btnJiwaPlus" type="button">+</button>
                                    </div>
                                </div>
                                <small class="text-muted">Edit nama muzakki akan mengikuti jumlah jiwa.</small>
                            </div>
                        </div>

                        <div class="col-md-8">
                            <div class="form-group">
                                <label for="zakatType">Jenis Zakat *</label>
                                <select class="form-control" id="zakatType">
                                    <option value="" selected disabled>Pilih jenis zakat...</option>
                                    <option value="ZAKAT_FITRAH_BERAS">Zakat Fitrah (Beras)</option>
                                    <option value="ZAKAT_FITRAH_UANG">Zakat Fitrah (Uang)</option>
                                </select>
                            </div>
                            <div class="form-group d-none" id="groupQuality">
                                <label for="zakatQualityId">Zakat Quality</label>
                                <select class="form-control" id="zakatQualityId" disabled>
                                    <option value="" selected disabled>Pilih zakat quality...</option>
                                </select>
                                <small class="text-muted" id="qualityHint"></small>
                            </div>

                            <div class="form-group d-none" id="groupNominal">
                                <label for="jumlahUang">Nominal Uang (Rp)</label>
                                <input class="form-control" id="jumlahUang" min="1" placeholder="0" step="1" type="number">
                            </div>

                            <div class="callout callout-info d-none" id="previewBox">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div><strong>Per jiwa:</strong> <span id="previewPerJiwa">-</span></div>
                                    </div>
                                    <div class="col-md-6">
                                        <div><strong>Total:</strong> <span id="previewTotal">-</span></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Data Muzakki</h3>
                </div>
                <div class="card-body" id="muzakkiContainer"></div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Zakat Mal, Infaq/Sedekah dan Fidiah</h3>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>Zakat Mal</label>
                                <input class="form-control" id="zakatMal" type="number" min="0" step="1" placeholder="0 (opsional)">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>Infaq/Sedekah</label>
                                <input class="form-control" id="infaqSedekah" type="number" min="0" step="1" placeholder="0 (opsional)">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label>Fidiah</label>
                                <input class="form-control" id="fidiah" type="number" min="0" step="1" placeholder="0 (opsional)">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <button class="btn btn-primary" id="btnSave" type="button">
                        <i class="fas fa-save"></i> Simpan Perubahan
                    </button>
                    <button class="btn btn-success ml-2" id="btnPrintReceipt" type="button">
                        <i class="fas fa-print"></i> Print Kwitansi
                    </button>
                    <a class="btn btn-default" href="/zakat-payments/list">Kembali</a>
                </div>
            </div>
        </div>
    </section>
</div>

<th:block layout:fragment="script">
    <script>
        (function () {
            const FITRAH_TYPES = new Set(["ZAKAT_FITRAH_BERAS", "ZAKAT_FITRAH_UANG"]);
            const paymentId = window.location.pathname.split("/").filter(Boolean).slice(-2)[0]; // /zakat-payments/{id}/edit

            const $alertSuccess = $("#alertSuccess");
            const $alertError = $("#alertError");
            const $receiptNumber = $("#receiptNumber");
            const $createdAt = $("#createdAt");
            const $zakatType = $("#zakatType");
            const $jumlahJiwa = $("#jumlahJiwa");
            const $btnJiwaMinus = $("#btnJiwaMinus");
            const $btnJiwaPlus = $("#btnJiwaPlus");
            const $groupQuality = $("#groupQuality");
            const $zakatQualityId = $("#zakatQualityId");
            const $qualityHint = $("#qualityHint");
            const $groupNominal = $("#groupNominal");
            const $jumlahUang = $("#jumlahUang");
            const $previewBox = $("#previewBox");
            const $previewPerJiwa = $("#previewPerJiwa");
            const $previewTotal = $("#previewTotal");
            const $muzakkiContainer = $("#muzakkiContainer");
            const $alamat = $("#alamat");
            const $payerName = $("#payerName");
            const $payerPhone = $("#payerPhone");
            const $btnSave = $("#btnSave");

            let currentPayment = null;
            let currentQualities = [];

            function showError(message) {
                $alertSuccess.addClass("d-none").text("");
                $alertError.removeClass("d-none").text(message || "Terjadi kesalahan");
                window.scrollTo({top: 0, behavior: "smooth"});
            }

            function showSuccess(message) {
                $alertError.addClass("d-none").text("");
                $alertSuccess.removeClass("d-none").text(message || "Berhasil");
                window.scrollTo({top: 0, behavior: "smooth"});
            }

            function formatNumber(n) {
                if (n === null || n === undefined || n === "") return "-";
                const num = Number(n);
                if (Number.isNaN(num)) return "-";
                return new Intl.NumberFormat("id-ID").format(num);
            }

            function clampJiwa() {
                let v = parseInt($jumlahJiwa.val(), 10);
                if (Number.isNaN(v) || v < 1) v = 1;
                $jumlahJiwa.val(String(v));
                return v;
            }

            function renderMuzakkiInputs(names) {
                const count = names.length;
                $muzakkiContainer.empty();
                for (let i = 0; i < count; i++) {
                    const idx = i + 1;
                    const name = names[i] || "";
                    const group = $(`
                        <div class="form-group">
                            <label>Nama Muzakki #${idx}</label>
                            <input class="form-control muzakki-name" placeholder="Nama muzakki" type="text" value="">
                        </div>
                    `);
                    group.find("input").val(name);
                    $muzakkiContainer.append(group);
                }
            }

            function isFitrahType(type) {
                return FITRAH_TYPES.has(type);
            }

            function updatePreview() {
                if (!currentPayment || !isFitrahType(currentPayment.zakatType)) {
                    $previewBox.addClass("d-none");
                    return;
                }
                const selectedId = $zakatQualityId.val();
                const q = currentQualities.find(x => x.id === selectedId);
                if (!q) {
                    $previewBox.addClass("d-none");
                    return;
                }
                const jiwa = clampJiwa();
                if (currentPayment.zakatType === "ZAKAT_FITRAH_BERAS") {
                    const perJiwa = q.beratPerJiwaKg;
                    const total = perJiwa * jiwa;
                    $previewPerJiwa.text(`${formatNumber(perJiwa)} Kg`);
                    $previewTotal.text(`${formatNumber(total)} Kg`);
                } else {
                    const perJiwa = q.nominalPerJiwa;
                    const total = perJiwa * jiwa;
                    $previewPerJiwa.text(`Rp ${formatNumber(perJiwa)}`);
                    $previewTotal.text(`Rp ${formatNumber(total)}`);
                }
                $previewBox.removeClass("d-none");
            }

            async function loadQualities(zakatType, selectedId) {
                $qualityHint.text("");
                $zakatQualityId.prop("disabled", true);
                $zakatQualityId.empty().append(`<option value="" selected disabled>Memuat...</option>`);
                currentQualities = [];
                $previewBox.addClass("d-none");

                try {
                    const res = await fetch(`/api/zakat-qualities?zakatType=${encodeURIComponent(zakatType)}`, {
                        headers: {"Accept": "application/json"}
                    });
                    if (!res.ok) throw new Error(`Gagal load zakat quality (${res.status})`);
                    const list = await res.json();
                    currentQualities = Array.isArray(list) ? list : [];

                    $zakatQualityId.empty().append(`<option value="" selected disabled>Pilih zakat quality...</option>`);
                    for (const q of currentQualities) {
                        const label = (() => {
                            if (zakatType === "ZAKAT_FITRAH_BERAS") return `${q.name} (${formatNumber(q.beratPerJiwaKg)} Kg/jiwa)`;
                            return `${q.name} (Rp ${formatNumber(q.nominalPerJiwa)}/jiwa)`;
                        })();
                        $zakatQualityId.append(`<option value="${q.id}">${label}</option>`);
                    }
                    $zakatQualityId.prop("disabled", false);
                    if (selectedId) $zakatQualityId.val(selectedId);
                    updatePreview();
                } catch (e) {
                    $zakatQualityId.empty().append(`<option value="" selected disabled>Gagal memuat</option>`);
                    $qualityHint.text(String(e.message || e));
                }
            }

            function updateTypeUI(selectedQualityId) {
                $alertError.addClass("d-none").text("");
                $alertSuccess.addClass("d-none").text("");

                const val = $zakatType.val();
                if (isFitrahType(val)) {
                    $groupNominal.addClass("d-none");
                    $jumlahUang.val("");

                    $groupQuality.removeClass("d-none");
                    $zakatQualityId.val("");
                    // pass selectedQualityId to loadQualities so it can pre-select
                    loadQualities(val, selectedQualityId);
                    $muzakkiContainer.closest('.card').show();
                } else if (val === 'FIDIAH') {
                    $groupQuality.addClass("d-none");
                    $zakatQualityId.val("");
                    $qualityHint.text("");
                    $previewBox.addClass("d-none");

                    $groupNominal.removeClass("d-none");
                    // render zero muzakki inputs
                    renderMuzakkiInputs([]);
                } else if (val) {
                    $groupQuality.addClass("d-none");
                    $zakatQualityId.val("");
                    $qualityHint.text("");
                    $previewBox.addClass("d-none");

                    $groupNominal.removeClass("d-none");
                    $muzakkiContainer.closest('.card').show();
                    const cnt = clampJiwa();
                    renderMuzakkiInputs(new Array(cnt).fill(""));
                } else {
                    $groupQuality.addClass("d-none");
                    $groupNominal.addClass("d-none");
                    $previewBox.addClass("d-none");
                    $muzakkiContainer.closest('.card').show();
                }
            }

             async function loadPayment() {
                try {
                    const res = await fetch(`/api/zakat-payments/${encodeURIComponent(paymentId)}`, {headers: {"Accept": "application/json"}});
                    if (!res.ok) throw new Error(`Gagal load payment (${res.status})`);
                    currentPayment = await res.json();

                    if (currentPayment.canceled) {
                        $btnSave.prop("disabled", true);
                        showError("Payment ini sudah dibatalkan dan tidak bisa diedit.");
                    }

                    $receiptNumber.val(currentPayment.receiptNumber || "");
                    $zakatType.val(currentPayment.zakatTypeLabel || currentPayment.zakatType || "");
                    $alamat.val(currentPayment.alamat || "");
                    $payerName.val(currentPayment.payerName || "");
                    $payerPhone.val(currentPayment.payerPhone || "");

                    if (currentPayment.createdAt) {
                        const d = new Date(currentPayment.createdAt);
                        $createdAt.val(new Intl.DateTimeFormat("id-ID", {dateStyle: "medium", timeStyle: "short"}).format(d));
                    }

                    const names = Array.isArray(currentPayment.muzakkiNames) ? currentPayment.muzakkiNames : [];
                    // If payment type is FIDIAH, hide muzakki inputs and don't render names
                    if (currentPayment.zakatType === 'FIDIAH') {
                        $muzakkiContainer.closest('.card').hide();
                        $jumlahJiwa.val('1');
                        renderMuzakkiInputs([]);
                    } else {
                        $muzakkiContainer.closest('.card').show();
                        $jumlahJiwa.val(String(names.length || 1));
                        renderMuzakkiInputs(names.length ? names : [""]);
                    }

                    const selectedId = currentPayment.zakatQuality ? currentPayment.zakatQuality.id : null;
                    // set zakatType select value (may be blank for non-fitrah)
                    $zakatType.val(currentPayment.zakatType || "");
                    $jumlahUang.val(currentPayment.jumlahUang || "");
                    $("#zakatMal").val(currentPayment.jumlahUangZakatMal || "");
                    $("#infaqSedekah").val(currentPayment.jumlahUangInfaqSedekah || "");
                    $("#fidiah").val(currentPayment.jumlahUangFidiah || "");
                    // update UI based on current zakatType and preselect quality if present
                    updateTypeUI(selectedId);
                 } catch (e) {
                     showError(String(e.message || e));
                 }
             }

            async function submit() {
                const jiwa = clampJiwa();
                const alamat = ($alamat.val() || "").trim();
                const names = $(".muzakki-name").toArray().map(el => (el.value || "").trim()).filter(x => x.length);

                if (!currentPayment) return;
                if (!alamat) return showError("Alamat wajib diisi");
                const selectedType = $zakatType.val();
                // Skip muzakki validation for Fidiah (nominal-only)
                if (selectedType !== 'FIDIAH' && names.length !== jiwa) return showError("Jumlah nama muzakki harus sama dengan jumlah jiwa");

                const payload = {
                    alamat: alamat,
                    muzakkiNames: names
                };

                // include payer info in update
                payload.payerName = $payerName.val()?.trim() || null;
                payload.payerPhone = $payerPhone.val()?.trim() || null;

                if (isFitrahType(selectedType)) {
                    const qualityId = $zakatQualityId.val();
                    if (!qualityId) return showError("Zakat quality wajib dipilih");
                    payload.zakatQualityId = qualityId;
                } else {
                    // allow either jumlahUang or any of the optional separate nominals
                    const nominal = Number($jumlahUang.val());
                    const malAmtCheck = Number($("#zakatMal").val());
                    const infaqAmtCheck = Number($("#infaqSedekah").val());
                    const fidiahAmtCheck = Number($("#fidiah").val());
                    const hasAny = (!Number.isNaN(nominal) && nominal > 0)
                        || (!Number.isNaN(malAmtCheck) && malAmtCheck > 0)
                        || (!Number.isNaN(infaqAmtCheck) && infaqAmtCheck > 0)
                        || (!Number.isNaN(fidiahAmtCheck) && fidiahAmtCheck > 0);
                    if (!hasAny) return showError("Isi jumlahUang atau salah satu nominal opsional (Zakat Mal / Infaq / Fidiah)");
                    if (!Number.isNaN(nominal) && nominal > 0) payload.jumlahUang = nominal;
                }

                // include optional separate nominals if provided (>0)
                const malAmt = Number($("#zakatMal").val());
                if (!Number.isNaN(malAmt) && malAmt > 0) payload.jumlahUangZakatMal = malAmt;
                const infaqAmt = Number($("#infaqSedekah").val());
                if (!Number.isNaN(infaqAmt) && infaqAmt > 0) payload.jumlahUangInfaqSedekah = infaqAmt;
                const fidiahAmt = Number($("#fidiah").val());
                if (!Number.isNaN(fidiahAmt) && fidiahAmt > 0) payload.jumlahUangFidiah = fidiahAmt;

                $btnSave.prop("disabled", true);
                try {
                    const res = await fetch(`/api/zakat-payments/${encodeURIComponent(paymentId)}`, {
                        method: "PUT",
                        headers: {"Content-Type": "application/json", "Accept": "application/json"},
                        body: JSON.stringify(payload)
                    });
                    if (!res.ok) {
                        const text = await res.text();
                        return showError(text || `Gagal menyimpan (${res.status})`);
                    }
                    const data = await res.json();
                    currentPayment = data;
                    showSuccess("Perubahan tersimpan.");
                    // update fields from returned data
                    $("#zakatMal").val(currentPayment.jumlahUangZakatMal || "");
                    $("#infaqSedekah").val(currentPayment.jumlahUangInfaqSedekah || "");
                    $("#fidiah").val(currentPayment.jumlahUangFidiah || "");
                } catch (e) {
                    showError(String(e.message || e));
                } finally {
                    $btnSave.prop("disabled", false);
                }
            }

            $btnJiwaMinus.on("click", function () {
                const v = clampJiwa();
                const next = Math.max(1, v - 1);
                $jumlahJiwa.val(String(next));
                const currentNames = $(".muzakki-name").toArray().map(el => el.value || "");
                renderMuzakkiInputs(currentNames.slice(0, next));
                updatePreview();
            });
            $btnJiwaPlus.on("click", function () {
                const v = clampJiwa();
                const next = v + 1;
                $jumlahJiwa.val(String(next));
                const currentNames = $(".muzakki-name").toArray().map(el => el.value || "");
                currentNames.push("");
                renderMuzakkiInputs(currentNames);
                updatePreview();
            });
            $jumlahJiwa.on("change", function () {
                const next = clampJiwa();
                const currentNames = $(".muzakki-name").toArray().map(el => el.value || "");
                const adjusted = currentNames.slice(0, next);
                while (adjusted.length < next) adjusted.push("");
                renderMuzakkiInputs(adjusted);
                updatePreview();
            });
            $zakatQualityId.on("change", updatePreview);
            $zakatType.on("change", function () {
                // when user changes type in edit form, update UI and preview
                updateTypeUI();
                updatePreview();
            });
            $btnSave.on("click", submit);
            const $btnPrintReceipt = $("#btnPrintReceipt");
            $btnPrintReceipt.on("click", function () {
                if (!currentPayment || !currentPayment.id) return showError('Data payment belum tersedia');
                const url = `/zakat-payments/${encodeURIComponent(currentPayment.id)}/receipt`;
                window.open(url, '_blank', 'noopener');
            });

            loadPayment();
        })();
    </script>
</th:block>

</body>
</html>
