<!DOCTYPE html>
<html layout:decorate="~{shared/layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Profile Instansi/Masjid</title>
</head>
<body>

<div layout:fragment="content">
    <div class="content-header">
        <div class="container-fluid">
            <div class="row mb-2">
                <div class="col-sm-6">
                    <h1 class="m-0 text-dark">Profile Instansi/Masjid</h1>
                </div>
                <div class="col-sm-6">
                    <ol class="breadcrumb float-sm-right">
                        <li class="breadcrumb-item"><a href="/">Home</a></li>
                        <li class="breadcrumb-item active">Pengaturan</li>
                        <li class="breadcrumb-item active">Profile Instansi/Masjid</li>
                    </ol>
                </div>
            </div>
        </div>
    </div>

    <section class="content">
        <div class="container-fluid">

            <div class="alert alert-success d-none" id="alertSuccess"></div>
            <div class="alert alert-danger d-none" id="alertError"></div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Data Profile</h3>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label for="namaInstansi">Nama Instansi/Masjid *</label>
                        <input class="form-control" id="namaInstansi" type="text" placeholder="Nama instansi">
                    </div>
                    <div class="form-group">
                        <label for="kotaKabupaten">Kota / Kabupaten *</label>
                        <input class="form-control" id="kotaKabupaten" type="text" placeholder="Kota / Kabupaten">
                    </div>
                    <div class="form-group">
                        <label for="alamatLengkap">Alamat Lengkap *</label>
                        <textarea class="form-control" id="alamatLengkap" rows="3" placeholder="Alamat lengkap"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="namaKetua">Nama Ketua</label>
                        <input class="form-control" id="namaKetua" type="text" placeholder="Nama ketua">
                    </div>
                    <div class="form-group">
                        <label for="namaBendahara">Nama Bendahara</label>
                        <input class="form-control" id="namaBendahara" type="text" placeholder="Nama bendahara">
                    </div>
                </div>
                <div class="card-footer">
                    <button class="btn btn-primary" id="btnSave" type="button"><i class="fas fa-save"></i> Simpan</button>
                    <button class="btn btn-default" id="btnReset" type="button" disabled>Kembalikan ke tersimpan</button>
                </div>
            </div>

        </div>
    </section>
</div>

<th:block layout:fragment="script">
    <script>
        (function () {
            const $alertSuccess = $("#alertSuccess");
            const $alertError = $("#alertError");
            const $namaInstansi = $("#namaInstansi");
            const $kotaKabupaten = $("#kotaKabupaten");
            const $alamatLengkap = $("#alamatLengkap");
            const $namaKetua = $("#namaKetua");
            const $namaBendahara = $("#namaBendahara");
            const $btnSave = $("#btnSave");
            const $btnReset = $("#btnReset");

            // originalData holds the last-loaded server state (strings)
            let originalData = null;
            // prevent input handlers from reacting while we populate the form
            let isLoading = false;

            function getCurrentData() {
                return {
                    namaInstansi: ($namaInstansi.val() || '').trim(),
                    kotaKabupaten: ($kotaKabupaten.val() || '').trim(),
                    alamatLengkap: ($alamatLengkap.val() || '').trim(),
                    namaKetua: ($namaKetua.val() || '').trim(),
                    namaBendahara: ($namaBendahara.val() || '').trim()
                };
            }

            function isDirty() {
                if (!originalData) return false;
                const cur = getCurrentData();
                return cur.namaInstansi !== (originalData.namaInstansi || '')
                    || cur.kotaKabupaten !== (originalData.kotaKabupaten || '')
                    || cur.alamatLengkap !== (originalData.alamatLengkap || '')
                    || cur.namaKetua !== (originalData.namaKetua || '')
                    || cur.namaBendahara !== (originalData.namaBendahara || '');
            }

            function updateDirtyState() {
                try {
                    const dirty = isDirty();
                    $btnReset.prop('disabled', !dirty);
                } catch (e) {
                    // keep reset disabled on unexpected error
                    $btnReset.prop('disabled', true);
                }
            }

            function showError(msg) {
                $alertSuccess.addClass("d-none").text("");
                $alertError.removeClass("d-none").text(msg || "Terjadi kesalahan");
                window.scrollTo({top: 0, behavior: "smooth"});
            }

            function showSuccess(msg) {
                $alertError.addClass("d-none").text("");
                $alertSuccess.removeClass("d-none").text(msg || "Berhasil");
                window.scrollTo({top: 0, behavior: "smooth"});
            }

            async function load() {
                isLoading = true;
                try {
                    const res = await fetch('/api/institution-profile', {headers: {"Accept": "application/json"}});
                    if (res.status === 204) {
                        // no content: treat as empty snapshot so edits are detectable
                        $namaInstansi.val('');
                        $kotaKabupaten.val('');
                        $alamatLengkap.val('');
                        $namaKetua.val('');
                        $namaBendahara.val('');
                        originalData = {
                            namaInstansi: '',
                            kotaKabupaten: '',
                            alamatLengkap: '',
                            namaKetua: '',
                            namaBendahara: ''
                        };
                        updateDirtyState();
                        return;
                    }
                    if (!res.ok) throw new Error(`Gagal memuat (${res.status})`);
                    const data = await res.json();
                    $namaInstansi.val(data.namaInstansi || '');
                    $kotaKabupaten.val(data.kotaKabupaten || '');
                    $alamatLengkap.val(data.alamatLengkap || '');
                    $namaKetua.val(data.namaKetua || '');
                    $namaBendahara.val(data.namaBendahara || '');
                    // store a snapshot of server data to detect unsaved changes
                    originalData = {
                        namaInstansi: (data.namaInstansi || '').trim(),
                        kotaKabupaten: (data.kotaKabupaten || '').trim(),
                        alamatLengkap: (data.alamatLengkap || '').trim(),
                        namaKetua: (data.namaKetua || '').trim(),
                        namaBendahara: (data.namaBendahara || '').trim()
                    };
                    updateDirtyState();
                } catch (e) {
                    showError(String(e.message || e));
                } finally {
                    isLoading = false;
                }
            }

            function validate() {
                if (!($namaInstansi.val() || '').trim()) return 'Nama instansi wajib diisi';
                if (!($kotaKabupaten.val() || '').trim()) return 'Kota/Kabupaten wajib diisi';
                if (!($alamatLengkap.val() || '').trim()) return 'Alamat lengkap wajib diisi';
                return null;
            }

            async function save() {
                const err = validate();
                if (err) return showError(err);
                const payload = {
                    namaInstansi: ($namaInstansi.val() || '').trim(),
                    kotaKabupaten: ($kotaKabupaten.val() || '').trim(),
                    alamatLengkap: ($alamatLengkap.val() || '').trim(),
                    namaKetua: ($namaKetua.val() || '').trim(),
                    namaBendahara: ($namaBendahara.val() || '').trim()
                };

                $btnSave.prop('disabled', true);
                try {
                    const res = await fetch('/api/institution-profile', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!res.ok) {
                        const text = await res.text();
                        throw new Error(text || `Gagal menyimpan (${res.status})`);
                    }
                    showSuccess('Profile disimpan');
                } catch (e) {
                    showError(String(e.message || e));
                } finally {
                    $btnSave.prop('disabled', false);
                }
            }

            function resetForm() {
                $alertError.addClass('d-none').text('');
                $alertSuccess.addClass('d-none').text('');
                // reload from server (will disable Reset again because data matches server)
                load();
            }

            // Ensure Reset is disabled initially
            $btnReset.prop('disabled', true);

            // wire up inputs to toggle Reset button when the form is changed
            [$namaInstansi, $kotaKabupaten, $alamatLengkap, $namaKetua, $namaBendahara].forEach($el => {
                $el.on('input', function () {
                    if (isLoading) return; // ignore events while loading initial values
                    updateDirtyState();
                });
            });

            $btnSave.on('click', async function () {
                await save();
                // after successful save we should reload server snapshot
                try {
                    // small delay to allow server to process and respond; then reload
                    await load();
                } catch (e) {
                    // ignore - load handles showing errors
                }
            });
            $btnReset.on('click', resetForm);

            // init
            load();
        })();
    </script>
</th:block>

</body>
</html>
