<!-- Navbar -->
<nav class="main-header navbar navbar-expand navbar-white navbar-light">
    <ul class="navbar-nav">
        <li class="nav-item">
            <a class="nav-link" data-widget="pushmenu" href="#" role="button"><i class="fas fa-bars"></i></a>
        </li>
    </ul>

    <!-- Right navbar links -->
    <ul class="navbar-nav ml-auto">
        <li class="nav-item dropdown user-menu show">
            <a aria-expanded="true" class="nav-link dropdown-toggle" data-toggle="dropdown" href="#">
                <!-- Replaced photo with a Font Awesome user icon -->
                <span class="user-image img-circle elevation-2" aria-hidden="true"
                      style="display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;background:transparent;color:currentColor;">
                    <i class="fas fa-user" aria-hidden="true" style="font-size:18px;"></i>
                </span>
                <!-- Display logged-in user's name. Fallback order:
                     1) Spring Security authentication name (#authentication.name) if thymeleaf-extras-springsecurity5 is present
                     2) session attribute 'user.name'
                     3) literal 'Guest' -->
                <span class="d-none d-md-inline" th:text="${#authentication != null and #authentication.name != null} ? ${#authentication.name} : (${session.user != null and session.user.name != null} ? ${session.user.name} : 'Guest')">Guest</span>
            </a>
            <ul class="dropdown-menu dropdown-menu-lg dropdown-menu-right">
                <!-- User image -->
                <li class="user-header bg-primary">
                    <!-- Replaced large avatar image with an icon to keep UI simple -->
                    <div style="display:flex;align-items:center;justify-content:center;width:80px;height:80px;margin:0 auto 10px;border-radius:50%;background:rgba(255,255,255,0.08);">
                        <i class="fas fa-user fa-2x" aria-hidden="true" style="color:#fff;"></i>
                    </div>
                    <p>
                        <!-- Show name and optional role/description. Use same fallback as above for name. -->
                        <span th:text="${#authentication != null and #authentication.name != null} ? ${#authentication.name} : (${session.user != null and session.user.name != null} ? ${session.user.name} : 'Guest')">Guest</span>
                        <span th:if="${session.user != null and session.user.title != null}"> - <span th:text="${session.user.title}">User</span></span>
                    </p>
                </li>
                <!-- Menu Footer-->
                <li class="user-footer">
                    <a class="btn btn-default btn-flat float-right" href="/logout">Sign out</a>
                </li>
            </ul>
        </li>
    </ul>
</nav>
<!-- /.navbar -->
