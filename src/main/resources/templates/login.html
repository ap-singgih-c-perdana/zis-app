<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <title>ZIS App - Login</title>
    <meta content="width=device-width, initial-scale=1" name="viewport">

    <!-- Font Awesome -->
    <link rel="stylesheet" th:href="@{~/webjars/AdminLTE/3.2.0/plugins/fontawesome-free/css/all.min.css}"
          type="text/css">
    <!-- icheck bootstrap -->
    <link rel="stylesheet" th:href="@{~/webjars/AdminLTE/3.2.0/plugins/icheck-bootstrap/icheck-bootstrap.min.css}"
          type="text/css">
    <!-- Theme style -->
    <link rel="stylesheet" th:href="@{~/webjars/AdminLTE/3.2.0/dist/css/adminlte.min.css}" type="text/css">
    <style>
        /* Keep the login simple and centered */
        .login-logo img { max-width: 90px; }
        .login-card-body { padding: 1.75rem; }
        .input-with-icon { position: relative; }
        .input-with-icon .fa { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #6c757d; }
        .input-with-icon input { padding-left: 38px; }
    </style>
</head>
<body class="hold-transition login-page">
<div class="login-box">
    <div class="login-logo text-center">
        <!-- Use a zakat-themed image if available in /img; fallback to text -->
        <a href="#">
            <img alt="Zakat logo" src="/img/login.png" class="login-logo-img">
            <div style="font-weight:700; margin-top:8px;">ZIS App</div>
        </a>
    </div>
    <!-- /.login-logo -->
    <div class="card">
        <div class="card-body login-card-body">
            <p class="text-center mb-3 h5">Please sign in</p>

            <p class="text-danger text-center" th:if="${param.error}">User/password is invalid.</p>
            <p class="text-success text-center" th:if="${param.logout}">You have been logged out.</p>

            <form method="post" th:action="@{~/login}">
                <div class="mb-3 input-with-icon">
                    <label for="username" class="sr-only">Username</label>
                    <i class="fa fa-user"></i>
                    <input id="username" class="form-control" name="username" placeholder="Username or Email" type="text" required>
                </div>
                <div class="mb-3 input-with-icon">
                    <label for="password" class="sr-only">Password</label>
                    <i class="fa fa-lock"></i>
                    <input id="password" class="form-control" name="password" placeholder="Password" type="password" required>
                </div>
                <div class="row">
                    <div class="col-12">
                        <button class="btn btn-primary btn-block" type="submit">Sign In</button>
                    </div>
                </div>
            </form>

        </div>
        <!-- /.login-card-body -->
    </div>
    <p class="text-center mt-3">Aplikasi untuk pengelolaan Zakat & Infak</p>
</div>
<!-- /.login-box -->

<!-- jQuery -->
<script th:src="@{~/webjars/AdminLTE/3.2.0/plugins/jquery/jquery.min.js}" type="text/javascript"></script>
<!-- Bootstrap 4 -->
<script th:src="@{~/webjars/AdminLTE/3.2.0/plugins/bootstrap/js/bootstrap.bundle.min.js}"
        type="text/javascript"></script>
<!-- AdminLTE App -->
<script th:src="@{~/webjars/AdminLTE/3.2.0/dist/js/adminlte.min.js}" type="text/javascript"></script>
<!-- small script to hide broken logo images (avoid inline onerror attribute) -->
<script>
    (function(){
        var img = document.querySelector('.login-logo img');
        if(!img) return;
        img.addEventListener('error', function(){ this.style.display = 'none'; });
        img.addEventListener('load', function(){ if(this.naturalWidth === 0) this.style.display = 'none'; });
    })();
</script>

</body>
</html>
