<!DOCTYPE html>
<html layout:decorate="~{shared/layout}"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Data Muzakki</title>
    <style>
        @media print {
            .no-print { display: none !important; }
            .content-wrapper { background: #fff !important; }
            .card { box-shadow: none !important; border: none !important; }
            table { font-size: 12px; }
        }
    </style>
</head>
<body>

<div layout:fragment="content">
    <div class="content-header no-print">
        <div class="container-fluid">
            <div class="row mb-2">
                <div class="col-sm-6">
                    <h1 class="m-0 text-dark">Data Muzakki</h1>
                </div>
                <div class="col-sm-6">
                    <ol class="breadcrumb float-sm-right">
                        <li class="breadcrumb-item"><a href="/">Home</a></li>
                        <li class="breadcrumb-item active">Data Muzakki</li>
                    </ol>
                </div>
            </div>
        </div>
    </div>

    <section class="content">
        <div class="container-fluid">

            <div class="card no-print">
                <div class="card-header">
                    <h3 class="card-title">Filter</h3>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-3">
                            <div class="form-group">
                                <label for="filterFrom">Dari</label>
                                <input class="form-control" id="filterFrom" type="date">
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="form-group">
                                <label for="filterTo">Sampai</label>
                                <input class="form-control" id="filterTo" type="date">
                            </div>
                        </div>
                        <div class="col-md-6 d-flex align-items-end">
                            <button class="btn btn-primary mr-2" id="btnApply" type="button">Tampilkan</button>
                            <button class="btn btn-default mr-2" id="btnReset" type="button">Reset</button>
                            <button class="btn btn-info mr-2" id="btnExport" type="button">
                                <i class="fas fa-file-csv"></i> Export CSV
                            </button>
                            <button class="btn btn-success" id="btnPrint" type="button">
                                <i class="fas fa-print"></i> Print
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="text-center mb-3">
                        <h4 class="mb-0"><strong>LAPORAN DATA MUZAKKI LENGKAP</strong></h4>
                        <div class="text-muted" id="periodeLabel">Periode: -</div>
                    </div>

                    <div id="instansiBox" class="d-none mb-3">
                        <div><strong id="instansiNama">-</strong></div>
                        <div class="text-muted" id="instansiAlamat">-</div>
                        <div class="text-muted" id="instansiKota">-</div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-bordered table-sm">
                            <thead>
                            <tr>
                                <th style="width: 50px">No</th>
                                <th style="width: 110px">Tanggal</th>
                                <th>Nama Muzakki</th>
                                <th style="width: 150px">Jenis</th>
                                <th style="width: 140px" class="text-right">Nominal (Rp)</th>
                                <th style="width: 120px" class="text-right">Beras (Kg)</th>
                                <th style="width: 80px" class="text-right">Jiwa</th>
                            </tr>
                            </thead>
                            <tbody id="rows">
                            <tr>
                                <td colspan="7" class="text-center text-muted">Memuat...</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="mt-3">
                        <div><strong>Total Nominal:</strong> <span id="sumNominal">-</span></div>
                        <div><strong>Total Beras:</strong> <span id="sumBeras">-</span></div>
                        <div><strong>Total Jiwa:</strong> <span id="sumJiwa">-</span></div>
                    </div>
                </div>
            </div>

        </div>
    </section>
</div>

<th:block layout:fragment="script">
    <script>
        (function () {
            const $from = $("#filterFrom");
            const $to = $("#filterTo");
            const $btnApply = $("#btnApply");
            const $btnReset = $("#btnReset");
            const $btnExport = $("#btnExport");
            const $btnPrint = $("#btnPrint");

            const $periodeLabel = $("#periodeLabel");
            const $rows = $("#rows");
            const $sumNominal = $("#sumNominal");
            const $sumBeras = $("#sumBeras");
            const $sumJiwa = $("#sumJiwa");

            const $instansiBox = $("#instansiBox");
            const $instansiNama = $("#instansiNama");
            const $instansiAlamat = $("#instansiAlamat");
            const $instansiKota = $("#instansiKota");

            function todayIso() {
                return new Date().toISOString().slice(0, 10);
            }

            function rupiah(v) {
                const n = Number(v ?? 0);
                return `Rp ${new Intl.NumberFormat("id-ID").format(n)}`;
            }

            function kg(v) {
                const n = Number(v ?? 0);
                return `${new Intl.NumberFormat("id-ID").format(n)} Kg`;
            }

            function escapeHtml(str) {
                return String(str ?? "")
                    .replaceAll("&", "&amp;")
                    .replaceAll("<", "&lt;")
                    .replaceAll(">", "&gt;")
                    .replaceAll("\"", "&quot;")
                    .replaceAll("'", "&#039;");
            }

            function buildCsvUrl() {
                const from = $from.val();
                const to = $to.val();
                return `/api/reports/muzakki-detail.csv?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`;
            }

            async function load() {
                const from = $from.val();
                const to = $to.val();
                if (!from || !to) return;

                $periodeLabel.text(`Periode: ${from} s/d ${to}`);
                $rows.empty().append(`<tr><td colspan="7" class="text-center text-muted">Memuat...</td></tr>`);

                const res = await fetch(`/api/reports/muzakki-detail?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`, {
                    headers: {"Accept": "application/json"}
                });
                if (!res.ok) {
                    const t = await res.text();
                    $rows.empty().append(`<tr><td colspan="7" class="text-center text-danger">${escapeHtml(t || `Gagal load (${res.status})`)}</td></tr>`);
                    return;
                }

                const data = await res.json();
                const list = Array.isArray(data.rows) ? data.rows : [];

                $rows.empty();
                if (!list.length) {
                    $rows.append(`<tr><td colspan="7" class="text-center text-muted">Tidak ada data</td></tr>`);
                } else {
                    for (const r of list) {
                        $rows.append(`
                            <tr>
                                <td>${r.no ?? ""}</td>
                                <td>${escapeHtml(r.tanggal ?? "")}</td>
                                <td>${escapeHtml(r.namaMuzakki ?? "")}</td>
                                <td>${escapeHtml(r.zakatTypeLabel || r.zakatType || "")}</td>
                                <td class="text-right">${r.nominalRp == null ? "-" : rupiah(r.nominalRp)}</td>
                                <td class="text-right">${r.berasKg == null ? "-" : kg(r.berasKg)}</td>
                                <td class="text-right">${r.jiwa ?? ""}</td>
                            </tr>
                        `);
                    }
                }

                $sumNominal.text(rupiah(data.totalNominalRp ?? 0));
                $sumBeras.text(kg(data.totalBerasKg ?? 0));
                $sumJiwa.text(String(data.totalJiwa ?? 0));

                const prof = data.institutionProfile;
                if (prof) {
                    $instansiBox.removeClass("d-none");
                    $instansiNama.text(prof.namaInstansi || "-");
                    $instansiAlamat.text(prof.alamatLengkap || "-");
                    $instansiKota.text(prof.kotaKabupaten || "-");
                } else {
                    $instansiBox.addClass("d-none");
                }
            }

            $btnApply.on("click", load);
            $btnReset.on("click", function () {
                const iso = todayIso();
                $from.val(iso);
                $to.val(iso);
                load();
            });
            $btnExport.on("click", function () {
                window.location.href = buildCsvUrl();
            });
            $btnPrint.on("click", function () {
                window.print();
            });

            const iso = todayIso();
            $from.val(iso);
            $to.val(iso);
            load();
        })();
    </script>
</th:block>

</body>
</html>
